<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2463;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F3480;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="0"/>
  <!-- Gold accent circle -->
  <circle cx="340" cy="60" r="30" fill="#F4D35E" opacity="0.15"/>
  <circle cx="60" cy="340" r="40" fill="#D8315B" opacity="0.1"/>
  <!-- Initial -->
  <text x="200" y="240" font-family="'Playfair Display', Georgia, serif" font-size="160" font-weight="900" fill="#F4D35E" text-anchor="middle" dominant-baseline="middle">飞</text>
  <!-- Subtitle line -->
  <line x1="140" y1="290" x2="260" y2="290" stroke="#F4D35E" stroke-width="2" opacity="0.6"/>
  <text x="200" y="325" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="3">FEIHONG</text>
</svg>
